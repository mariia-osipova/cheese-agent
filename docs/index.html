<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="src/cheese/cheese_PNG10-3878731391.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <title>Cheese Master</title>
  <style>
    /* ── Tokens ───────────────────────────────────────────────────────── */
    :root {
      --gold:         #efc74d;
      --dark:         #31383c;
      --glass:        rgba(255,255,255,0.45);
      --glass-strong: rgba(255,255,255,0.78);
      --glass-input:  rgba(255,255,255,0.65);
      --correct:      #52b472;
      --correct-bg:   #eaf5ee;
      --wrong:        #d95858;
      --wrong-bg:     #faeaea;
      --w-open:       460px;
      --h-open:       600px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }
    .visually-hidden {
      position: absolute; width: 1px; height: 1px; padding: 0;
      margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ── Background ───────────────────────────────────────────────────── */
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--dark);
      background-size: cover; background-position: center; background-repeat: no-repeat;
    }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: rgba(49,56,60,0.72);
      pointer-events: none; z-index: 0;
    }

    /* ── Widget wrapper ───────────────────────────────────────────────── */
    #widget-wrapper {
      position: relative; z-index: 1;
      width: 80px; height: 80px;
      cursor: pointer;
    }
    #widget-wrapper.is-open {
      width: var(--w-open); height: var(--h-open);
      cursor: default;
    }

    /* ── Cheese icon ──────────────────────────────────────────────────── */
    #cheese-icon {
      position: absolute; top: 0; left: 0;
      width: 80px; height: 80px; pointer-events: none;
      opacity: 1; transform: scale(1);
      transition: opacity 0.3s ease 0.2s, transform 0.3s cubic-bezier(0.34,1.5,0.64,1) 0.2s;
    }
    #widget-wrapper.is-open #cheese-icon {
      opacity: 0; transform: scale(0.7);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    /* ── Chat panel ───────────────────────────────────────────────────── */
    #chat-panel {
      position: absolute; inset: 0;
      background: var(--gold);
      border-radius: 50%;
      overflow: hidden;
      opacity: 0;
      display: flex; flex-direction: column;
      transition: border-radius 0.4s ease, opacity 0.25s ease 0.15s, box-shadow 0.3s ease;
    }
    #widget-wrapper.is-open #chat-panel {
      border-radius: 32px;
      opacity: 1;
      padding: 20px;
      gap: 14px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.45);
      transition: border-radius 0.55s cubic-bezier(0.22,1.4,0.36,1), opacity 0.25s ease, box-shadow 0.4s ease;
    }

    /* ── Keyframes ────────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes msg-rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dot-bob {
      0%, 55%, 100% { opacity: 0.25; transform: translateY(0); }
      28%            { opacity: 1;   transform: translateY(-3px); }
    }
    @keyframes countdown-pop {
      from { opacity: 0; transform: scale(1.6); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.92) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Header ───────────────────────────────────────────────────────── */
    #chat-header {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
      opacity: 0;
    }
    #widget-wrapper.is-open #chat-header { animation: fadeUp 0.4s ease 0.3s both; }

    .header-pill {
      height: 36px; padding: 0 12px;
      background: var(--dark); border-radius: 999px;
      display: flex; align-items: center; gap: 2px;
      font-size: 18px; white-space: nowrap; flex-shrink: 0;
    }
    .header-text { display: flex; flex-direction: column; }
    .header-eyebrow {
      font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--dark); opacity: 0.55; margin-bottom: 2px;
    }
    .header-title {
      font-size: 18px; font-weight: 600; color: var(--dark); line-height: 1;
    }

    /* ── Messages ─────────────────────────────────────────────────────── */
    #chat-messages {
      flex: 1; min-height: 0; overflow-y: auto;
      background: var(--glass);
      border-radius: 16px;
      padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
      opacity: 0;
    }
    #widget-wrapper.is-open #chat-messages { animation: fadeUp 0.4s ease 0.38s both; }

    #chat-messages::-webkit-scrollbar { width: 3px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(49,56,60,0.25); border-radius: 2px; }

    .msg-wrapper { display: flex; flex-direction: column; animation: msg-rise 0.35s cubic-bezier(0.16,1,0.3,1) both; }
    .msg-wrapper.user { align-items: flex-end; }
    .msg-wrapper.bot  { align-items: flex-start; }

    .msg-sender {
      font-size: 0.6rem; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(49,56,60,0.45);
      margin-bottom: 5px; padding: 0 4px;
    }
    .msg {
      max-width: 84%; padding: 10px 14px; border-radius: 17px;
      font-size: 0.88rem; line-height: 1.6; word-break: break-word;
    }
    .msg.user { background: var(--dark); color: var(--gold); border-bottom-right-radius: 4px; }
    .msg.user.is-command { background: rgba(49,56,60,0.75); color: var(--gold); font-size: 0.82rem; padding: 8px 13px; }
    .msg.bot  { background: var(--glass-strong); color: var(--dark); border-bottom-left-radius: 4px; }
    .msg.error { background: rgba(217,88,88,0.18); color: #b83030; font-size: 0.85rem; border-bottom-left-radius: 4px; }
    .msg.typing {
      color: rgba(49,56,60,0.55); font-style: italic;
      display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    }
    .typing-dots { display: inline-flex; gap: 4px; align-items: center; flex-shrink: 0; }
    .typing-dots span {
      display: block; width: 4px; height: 4px; border-radius: 50%;
      background: rgba(49,56,60,0.45); animation: dot-bob 1.3s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.30s; }

    /* ── Command palette ──────────────────────────────────────────────── */
    #palette-wrapper {
      flex-shrink: 0;
      display: grid; grid-template-rows: 0fr;
      transition: grid-template-rows 0.16s cubic-bezier(0.16,1,0.3,1);
    }
    #palette-wrapper.open { grid-template-rows: 1fr; }
    #command-palette { min-height: 0; overflow: hidden; }

    .palette-inner {
      background: rgba(49,56,60,0.07);
      border-radius: 12px; margin-bottom: 2px;
    }
    .palette-label {
      padding: 8px 14px 3px;
      font-size: 0.55rem; font-weight: 500; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(49,56,60,0.45);
    }
    .palette-list { list-style: none; padding: 2px 8px 6px; max-height: 192px; overflow-y: auto; }
    .palette-list::-webkit-scrollbar { width: 3px; }
    .palette-list::-webkit-scrollbar-track { background: transparent; }
    .palette-list::-webkit-scrollbar-thumb { background: rgba(49,56,60,0.2); border-radius: 2px; }

    .command-item {
      width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; background: none; border: none; border-radius: 10px;
      cursor: pointer; text-align: left; font-family: 'Outfit', system-ui, sans-serif;
      transition: background 0.1s ease;
    }
    .command-item:hover, .command-item.active { background: rgba(49,56,60,0.1); }

    .cmd-icon {
      width: 28px; height: 28px; flex-shrink: 0; border-radius: 8px;
      background: rgba(255,255,255,0.65);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
    }
    .cmd-body { flex: 1; min-width: 0; }
    .cmd-name { display: block; font-size: 0.82rem; font-weight: 500; color: var(--dark); line-height: 1.2; }
    .cmd-desc { display: block; font-size: 0.71rem; color: rgba(49,56,60,0.55); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cmd-arg-hint {
      font-size: 0.65rem; color: rgba(49,56,60,0.55);
      background: rgba(49,56,60,0.1);
      padding: 2px 7px; border-radius: 4px; font-style: italic;
      flex-shrink: 0; white-space: nowrap;
    }
    .palette-empty { padding: 10px 14px; font-size: 0.8rem; color: rgba(49,56,60,0.5); font-style: italic; }

    /* ── Input row ────────────────────────────────────────────────────── */
    #chat-input-row {
      flex-shrink: 0;
      display: flex; gap: 8px; align-items: center;
      opacity: 0;
    }
    #widget-wrapper.is-open #chat-input-row { animation: fadeUp 0.4s ease 0.45s both; }

    #chat-input {
      flex: 1; padding: 10px 16px;
      font-size: 0.87rem; font-family: 'Outfit', system-ui, sans-serif;
      border: none; border-radius: 20px; outline: none;
      background: var(--glass-input); color: var(--dark);
      transition: background 0.15s ease;
    }
    #chat-input::placeholder { color: rgba(49,56,60,0.5); font-style: italic; }
    #chat-input:focus   { background: rgba(255,255,255,0.82); }
    #chat-input.slash-mode { background: rgba(255,255,255,0.82); }

    #send-btn {
      width: 40px; height: 40px; min-width: 40px; flex-shrink: 0;
      border-radius: 50%; border: none;
      background: var(--dark); color: var(--gold);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s cubic-bezier(0.34,1.5,0.64,1);
    }
    #send-btn:hover  { transform: scale(1.15); }
    #send-btn:active { transform: scale(0.9); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 16px; height: 16px; display: block; }

    /* ── Modal base ───────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay[hidden] { display: none; }
    .modal-backdrop {
      position: absolute; inset: 0;
      background: rgba(20,24,26,0.72);
      backdrop-filter: blur(4px);
    }
    .modal-panel {
      position: relative; z-index: 1;
      background: var(--gold);
      border-radius: 28px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.45);
      overflow: hidden;
      animation: modal-in 0.32s cubic-bezier(0.16,1,0.3,1) both;
      width: 100%;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 26px 18px;
      border-bottom: 1px solid rgba(49,56,60,0.12);
    }
    .modal-eyebrow {
      font-size: 0.62rem; font-weight: 500; letter-spacing: 0.24em;
      text-transform: uppercase; color: rgba(49,56,60,0.55);
    }
    .modal-close {
      width: 30px; height: 30px; border-radius: 9px; border: none;
      background: rgba(49,56,60,0.1); color: rgba(49,56,60,0.6);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; line-height: 1;
      transition: background 0.1s ease, color 0.1s ease;
    }
    .modal-close:hover { background: rgba(49,56,60,0.18); color: var(--dark); }

    /* ── Quiz modal ───────────────────────────────────────────────────── */
    .quiz-panel { max-width: 500px; }
    .quiz-progress { height: 3px; background: rgba(49,56,60,0.15); }
    .quiz-progress-bar { height: 100%; background: var(--dark); transition: width 0.4s cubic-bezier(0.16,1,0.3,1); width: 0%; }
    .quiz-body { padding: 26px 26px 18px; }
    .quiz-counter { font-size: 0.67rem; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(49,56,60,0.5); margin-bottom: 12px; }
    .quiz-question {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.2rem, 3vw, 1.55rem); font-weight: 400; line-height: 1.35;
      color: var(--dark); margin-bottom: 22px;
    }
    .quiz-options { display: flex; flex-direction: column; gap: 9px; }
    .quiz-option {
      display: flex; align-items: center; gap: 13px;
      padding: 12px 16px; border-radius: 13px;
      border: 1.5px solid rgba(49,56,60,0.12);
      background: var(--glass); cursor: pointer; text-align: left;
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 0.88rem; color: var(--dark); line-height: 1.4;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
    }
    .quiz-option:hover { border-color: rgba(49,56,60,0.3); background: var(--glass-strong); }
    .quiz-option:active { transform: scale(0.98); }
    .opt-letter {
      width: 26px; height: 26px; flex-shrink: 0; border-radius: 7px;
      background: rgba(49,56,60,0.07);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.04em; color: rgba(49,56,60,0.6);
      transition: background 0.15s ease, color 0.15s ease;
    }
    .quiz-option.correct { border-color: var(--correct); background: var(--correct-bg); cursor: default; }
    .quiz-option.correct .opt-letter { background: var(--correct); color: white; }
    .quiz-option.wrong   { border-color: var(--wrong); background: var(--wrong-bg); cursor: default; opacity: 0.8; }
    .quiz-option.wrong   .opt-letter { background: var(--wrong); color: white; }
    .quiz-option.dim     { opacity: 0.4; cursor: default; }
    .quiz-option:disabled { cursor: default; }
    .quiz-feedback {
      margin-top: 18px; padding: 14px 16px; border-radius: 12px;
      background: rgba(49,56,60,0.07); border-left: 3px solid var(--dark);
      animation: msg-rise 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }
    .feedback-verdict { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
    .feedback-verdict.correct-v { color: var(--correct); }
    .feedback-verdict.wrong-v   { color: var(--wrong); }
    .feedback-text { font-size: 0.84rem; color: rgba(49,56,60,0.7); line-height: 1.55; }
    .quiz-footer { display: flex; align-items: center; justify-content: space-between; padding: 14px 26px 22px; gap: 14px; }
    .quiz-score-dots { display: flex; gap: 5px; }
    .score-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(49,56,60,0.2); transition: background 0.3s ease; }
    .score-dot.hit  { background: var(--correct); }
    .score-dot.miss { background: var(--wrong); opacity: 0.5; }
    .quiz-next-btn, .quiz-finish-btn {
      padding: 9px 18px; border-radius: 11px; border: none;
      background: var(--dark); color: var(--gold);
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 0.87rem; font-weight: 500; cursor: pointer;
      transition: opacity 0.15s ease, transform 0.1s ease; margin-left: auto;
    }
    .quiz-next-btn:hover, .quiz-finish-btn:hover { opacity: 0.82; }
    .quiz-next-btn:active, .quiz-finish-btn:active { transform: scale(0.96); }
    .quiz-final { padding: 34px 26px; text-align: center; animation: msg-rise 0.35s cubic-bezier(0.16,1,0.3,1) both; }
    .final-score-ring {
      width: 96px; height: 96px; border-radius: 50%; margin: 0 auto 18px;
      border: 3px solid rgba(49,56,60,0.15);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--glass-strong);
    }
    .final-score-num { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 2.3rem; font-weight: 300; line-height: 1; color: var(--dark); }
    .final-score-label { font-size: 0.58rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(49,56,60,0.5); }
    .final-verdict { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.45rem; font-weight: 400; color: var(--dark); margin-bottom: 7px; }
    .final-sub { font-size: 0.85rem; color: rgba(49,56,60,0.55); margin-bottom: 22px; }
    .quiz-again-btn {
      padding: 11px 26px; border-radius: 13px; border: none;
      background: var(--dark); color: var(--gold);
      font-family: 'Outfit', system-ui, sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer;
      transition: opacity 0.15s ease, transform 0.1s ease;
    }
    .quiz-again-btn:hover { opacity: 0.82; }

    /* ── Selfie modal ─────────────────────────────────────────────────── */
    .selfie-panel { max-width: 480px; }
    .selfie-body  { padding: 18px 22px 14px; }
    .selfie-viewport { position: relative; border-radius: 16px; overflow: hidden; background: #1a1e20; aspect-ratio: 4/3; }
    #selfie-video, #selfie-canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
    #selfie-video { transform: scaleX(-1); }
    .selfie-countdown { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(20,24,26,0.5); }
    .countdown-num { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 8rem; font-weight: 300; color: white; text-shadow: 0 4px 24px rgba(0,0,0,0.5); animation: countdown-pop 0.9s cubic-bezier(0.16,1,0.3,1) both; }
    .selfie-camera-error { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; padding: 24px; text-align: center; }
    .selfie-camera-error-icon { font-size: 2.5rem; opacity: 0.5; }
    .selfie-camera-error-text { font-size: 0.88rem; color: rgba(255,255,255,0.7); line-height: 1.5; }
    .selfie-caption { font-size: 0.77rem; color: rgba(49,56,60,0.55); text-align: center; margin-top: 10px; font-style: italic; min-height: 1.2em; }
    .selfie-footer { display: flex; gap: 9px; align-items: center; justify-content: center; padding: 12px 22px 22px; }
    .selfie-capture-btn {
      flex: 1; padding: 12px 18px; border-radius: 13px; border: none;
      background: var(--dark); color: var(--gold);
      font-family: 'Outfit', system-ui, sans-serif; font-size: 0.94rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s ease, transform 0.1s ease;
    }
    .selfie-capture-btn:hover   { opacity: 0.82; }
    .selfie-capture-btn:active  { transform: scale(0.97); }
    .selfie-capture-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .selfie-secondary-btn {
      padding: 12px 16px; border-radius: 13px; border: 1.5px solid rgba(49,56,60,0.15);
      background: var(--glass); color: rgba(49,56,60,0.7);
      font-family: 'Outfit', system-ui, sans-serif; font-size: 0.86rem; font-weight: 500; cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    }
    .selfie-secondary-btn:hover { border-color: rgba(49,56,60,0.3); background: var(--glass-strong); color: var(--dark); }

    /* ── Mobile ───────────────────────────────────────────────────────── */
    @media (max-width: 520px) {
      :root { --w-open: calc(100vw - 24px); --h-open: calc(100dvh - 24px); }
      .modal-overlay { padding: 12px; }
    }

    /* ── Reduced motion ───────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      #chat-messages { scroll-behavior: auto; }
    }
  </style>
</head>
<body>

  <div id="widget-wrapper" role="button" tabindex="0" aria-label="Open Cheese Master chat">

    <!-- Cheese wedge icon (visible when closed) -->
    <svg id="cheese-icon" viewBox="0 0 80 80" aria-hidden="true">
      <!-- cheese circle with wedge cut out: center → point on circle → large arc → back to center -->
      <path fill="#efc74d" d="M40,40 L75.1,54.5 A38,38 0 1 0 54.5,75.1 Z"/>
    </svg>

    <!-- Chat panel (morphs from circle to panel) -->
    <div id="chat-panel">

      <div id="chat-header">
        <span class="header-pill">🤖🧀</span>
        <div class="header-text">
          <span class="header-eyebrow">The Cheese Salon</span>
          <span class="header-title">Cheese Master</span>
        </div>
      </div>

      <div id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages">
        <div class="msg-wrapper bot">
          <span class="msg-sender">Cheese Master</span>
          <div class="msg bot">Bonjour! I'm your Cheese Master — ask me anything about the world of cheese. Type <strong>/</strong> to explore what I can do for you.</div>
        </div>
      </div>

      <div id="palette-wrapper" role="listbox" aria-label="Available commands" aria-hidden="true">
        <div id="command-palette">
          <div class="palette-inner">
            <p class="palette-label">Commands</p>
            <ul class="palette-list" id="command-list"></ul>
          </div>
        </div>
      </div>

      <div id="chat-input-row">
        <label for="chat-input" class="visually-hidden">Ask the Cheese Master</label>
        <input
          id="chat-input" type="text"
          placeholder="Which cheese has you curious?  (try /)"
          autocomplete="off" aria-label="Ask the Cheese Master"
          aria-autocomplete="list" aria-controls="command-list"
        />

  <script type="module" src="js/index.js"></script>
  <script>
    // Local dev → localhost:8000. Deployed → replace with your Render URL.
    const _h = window.location.hostname;
    const API_URL = (_h === 'localhost' || _h === '127.0.0.1' || _h === '' || window.location.protocol === 'file:')
      ? "http://localhost:8000/chat"
      : "https://YOUR-RENDER-APP-NAME.onrender.com/chat";

    // ── Widget open / close ──────────────────────────────────────────────
    const widgetWrapper = document.getElementById('widget-wrapper');
    let closeTimer = null;
    let widgetOpen  = false;
    const isTouchOnly = window.matchMedia('(hover: none)').matches;

    function openWidget() {
      if (widgetOpen) return;
      widgetOpen = true;
      widgetWrapper.style.transition =
        'width 0.55s cubic-bezier(0.22,1.4,0.36,1), height 0.55s cubic-bezier(0.22,1.4,0.36,1)';
      widgetWrapper.classList.add('is-open');
      widgetWrapper.removeAttribute('aria-label');
      // Focus input after panel finishes opening
      setTimeout(() => document.getElementById('chat-input').focus(), 520);
    }

    function closeWidget() {
      if (!widgetOpen) return;
      widgetOpen = false;
      widgetWrapper.style.transition =
        'width 0.4s cubic-bezier(0.4,0,0.6,1), height 0.4s cubic-bezier(0.4,0,0.6,1)';
      widgetWrapper.classList.remove('is-open');
      widgetWrapper.setAttribute('aria-label', 'Open Cheese Master chat');
    }

    if (isTouchOnly) {
      // Mobile: tap to open, tap outside to close
      widgetWrapper.addEventListener('click', (e) => { if (!widgetOpen) openWidget(); });
      document.addEventListener('click', (e) => {
        if (widgetOpen && !widgetWrapper.contains(e.target)) closeWidget();
      });
    } else {
      // Desktop: hover to open, delayed hover-out to close
      widgetWrapper.addEventListener('mouseenter', () => {
        clearTimeout(closeTimer);
        openWidget();
      });
      widgetWrapper.addEventListener('mouseleave', () => {
        clearTimeout(closeTimer);
        closeTimer = setTimeout(closeWidget, 1000);
      });
    }

    // Keyboard: Enter / Space to open when focused
    widgetWrapper.addEventListener('keydown', (e) => {
      if ((e.key === 'Enter' || e.key === ' ') && !widgetOpen) {
        e.preventDefault(); openWidget();
      }
    });

    // ── Quiz questions ────────────────────────────────────────────────────
    const QUIZ_QUESTIONS = [
      {
        q: "Which country is the exclusive producer of authentic Parmigiano-Reggiano?",
        options: ["France", "Switzerland", "Italy", "Spain"],
        answer: 2,
        fact: "Parmigiano-Reggiano has PDO status and can only be produced in specific provinces of northern Italy: Parma, Reggio Emilia, Modena, and parts of Bologna and Mantua.",
      },
      {
        q: "What living organism gives Roquefort its distinctive blue-green veins?",
        options: ["A cave bacteria", "Natural mineral deposits", "Penicillium roqueforti mold", "Blue algae from the caves"],
        answer: 2,
        fact: "Penicillium roqueforti is introduced into the cheese, then long needles are used to create air channels so the mold can breathe and develop throughout the wheel.",
      },
      {
        q: "Traditional mozzarella di bufala is made from the milk of which animal?",
        options: ["Cow", "Goat", "Sheep", "Water buffalo"],
        answer: 3,
        fact: "Authentic mozzarella di bufala uses Italian water buffalo milk, giving it a richer flavor and creamier texture than cow's milk mozzarella. The bufala herd in Italy numbers over 300,000.",
      },
      {
        q: "What does 'affinage' refer to in cheesemaking?",
        options: ["The salting of curds", "Aging and maturing of cheese", "Adding mold cultures to milk", "The pressing of the wheel"],
        answer: 1,
        fact: "An 'affineur' tends to cheeses as they mature — washing rinds, flipping wheels, managing cave humidity. It's a specialized craft entirely separate from the initial cheesemaking.",
      },
      {
        q: "What is the creamy, stranded filling inside a burrata called?",
        options: ["Ricotta", "Mascarpone", "Stracciatella", "Panna cotta"],
        answer: 2,
        fact: "Stracciatella (from 'stracciare', 'to tear') is shredded mozzarella mixed with fresh cream. It's also sold on its own and is what makes burrata so irresistibly rich.",
      },
      {
        q: "Manchego cheese must be made from the milk of which breed of sheep?",
        options: ["Merino", "Manchega", "Churra", "Latxa"],
        answer: 1,
        fact: "PDO Manchego requires milk exclusively from Manchega sheep, native to the La Mancha plateau of Spain — the same landscape famously roamed by Don Quixote.",
      },
      {
        q: "What does 'PDO' mean on a European cheese label?",
        options: ["Premium Dairy Origin", "Protected Designation of Origin", "Pure Dairy Organisation", "Product of Denominazione and Origin"],
        answer: 1,
        fact: "PDO (Protected Designation of Origin) guarantees the cheese was produced, processed, and prepared in a specific geographic region using recognized, traditional methods.",
      },
      {
        q: "Cheddar cheese takes its name from a village in which English county?",
        options: ["Devon", "Yorkshire", "Wiltshire", "Somerset"],
        answer: 3,
        fact: "Cheddar village in Somerset is home to the Cheddar Gorge caves, which provided near-perfect temperature and humidity for aging. Some of the oldest cheese artifacts in Britain were found there.",
      },
      {
        q: "What is the 'pasta filata' technique used to make?",
        options: ["Hard aged cheeses like Comté", "Stretched curd cheeses like mozzarella", "Blue-veined cheeses like Gorgonzola", "Washed-rind cheeses like Époisses"],
        answer: 1,
        fact: "'Pasta filata' (spun paste) is the stretching and kneading of hot curds in hot water. It gives mozzarella, provolone, scamorza, and caciocavallo their signature elastic texture.",
      },
      {
        q: "Which French cheese is famous for being washed in Marc de Bourgogne brandy?",
        options: ["Camembert", "Époisses", "Comté", "Reblochon"],
        answer: 1,
        fact: "Époisses de Bourgogne is washed repeatedly with Marc de Bourgogne during aging, creating its pungent orange rind. Napoléon reportedly called it the 'king of all cheeses.'",
      },
      {
        q: "Which country consumes the most cheese per capita in the world?",
        options: ["France", "Greece", "Denmark", "Iceland"],
        answer: 1,
        fact: "Greece leads global cheese consumption per person, largely due to feta — consumed at an average of about 23kg per person per year. France, often assumed the winner, comes in around 27kg but has a higher population.",
      },
      {
        q: "What characteristic makes Emmental (Swiss cheese) have its famous holes?",
        options: ["Air trapped during pressing", "CO₂ produced by Propionibacterium bacteria", "Water evaporating during aging", "The cheese being pierced for brine"],
        answer: 1,
        fact: "Propionibacterium freudenreichii bacteria consume lactic acid and release CO₂ gas during aging. The trapped bubbles create Emmental's iconic holes, called 'eyes.' Larger eyes = warmer aging cave.",
      },
    ];

    // ── Commands ──────────────────────────────────────────────────────────
    const COMMANDS = [
      { cmd: '/quiz',      icon: '◇', label: 'Quiz Me',      desc: 'Test your cheese knowledge with 5 questions', type: 'local', fn: openQuiz },
      { cmd: '/cheeseme', icon: '📸', label: 'Cheese Me',    desc: 'Take a selfie & get cheese on your head',     type: 'local', fn: openSelfie },
      { cmd: '/cheddar',  icon: '🟠', label: 'Go Cheddar',   desc: 'Watch cheddar drip down and consume the world', type: 'local', fn: openCheddar },
      { cmd: '/fact',     icon: '◈', label: 'Random Fact',  desc: 'Get a surprising cheese fact', type: 'immediate',
        prompt: 'Share a surprising, delightful, or little-known fact about cheese — something that would make a cheese lover say "I never knew that!"' },
      { cmd: '/pair',     icon: '⊕', label: 'Pairings',     desc: 'Food & wine pairings for any cheese', type: 'template', arg: 'cheese name',
        promptFn: (a) => `What foods, wines, and drinks pair best with ${a}? Give 4–5 specific pairings with a brief explanation of why each works.` },
      { cmd: '/describe', icon: '◉', label: 'Tasting Notes', desc: 'Evocative sensory description of a cheese', type: 'template', arg: 'cheese name',
        promptFn: (a) => `Give me rich, evocative tasting notes for ${a} — its texture, rind, aroma, and flavor profile. Make it vivid.` },
      { cmd: '/origin',   icon: '◎', label: 'Origin Story', desc: 'History & provenance of a cheese', type: 'template', arg: 'cheese name',
        promptFn: (a) => `Tell me about the origin, history, and cultural significance of ${a}. Where does it come from and why does it matter?` },
      { cmd: '/substitute', icon: '⇌', label: 'Find a Sub', desc: 'Best alternatives when you\'re out of a cheese', type: 'template', arg: 'cheese name',
        promptFn: (a) => `What are the best substitutes for ${a}? For each, explain when it works as a replacement and when it falls short.` },
      { cmd: '/board',    icon: '◆', label: 'Cheese Board', desc: 'A curated cheese board built just for now', type: 'immediate',
        prompt: 'Suggest a beautifully curated cheese board: 4–5 cheeses, the right accompaniments, presentation tips, and the rationale behind your choices.' },
      { cmd: '/season',   icon: '◌', label: 'In Season',    desc: 'What\'s at peak right now', type: 'immediate',
        prompt: 'What cheeses are at their absolute peak right now? Give me 3–4 seasonal picks with tasting notes and serving suggestions.' },
      { cmd: '/joke',     icon: '😄', label: 'Cheese Joke',  desc: 'Hit me with a cheese pun or joke', type: 'immediate',
        prompt: 'Tell me a clever, funny, or groan-worthy cheese joke or pun. Make it genuinely witty, not generic.' },
      { cmd: '/recipe',   icon: '🍳', label: 'Recipe',       desc: 'A recipe starring any cheese', type: 'template', arg: 'cheese name',
        promptFn: (a) => `Give me a delicious recipe where ${a} is the star ingredient. Include ingredients, steps, and a tip for getting the best flavour out of the cheese.` },
      { cmd: '/compare',  icon: '⚖', label: 'Compare',      desc: 'Compare two cheeses side by side', type: 'template', arg: 'cheese A and cheese B',
        promptFn: (a) => `Compare ${a} side by side: origin, texture, flavour profile, best uses, and which type of person would prefer each. Keep it lively and opinionated.` },
      { cmd: '/country',  icon: '🌍', label: 'By Country',   desc: 'Explore cheeses from any country', type: 'template', arg: 'country name',
        promptFn: (a) => `Tell me about the cheese culture of ${a}. What are its most iconic cheeses, what makes them unique, and what should a first-time explorer try first?` },
      { cmd: '/emoji',    icon: '✨', label: 'Cheese Emoji',  desc: 'Describe any cheese only in emojis', type: 'template', arg: 'cheese name',
        promptFn: (a) => `Describe ${a} using only emojis — capture its flavour, texture, origin, and vibe. Then give a one-sentence explanation of your emoji choices.` },
    ];

    // ── DOM refs ──────────────────────────────────────────────────────────
    const messagesEl     = document.getElementById('chat-messages');
    const inputEl        = document.getElementById('chat-input');
    const sendBtn        = document.getElementById('send-btn');
    const paletteWrapper = document.getElementById('palette-wrapper');
    const commandList    = document.getElementById('command-list');

    // ── Palette state ─────────────────────────────────────────────────────
    let paletteOpen  = false;
    let activeIndex  = 0;
    let filteredCmds = [];

    function openPalette(filter = '') {
      filteredCmds = filter
        ? COMMANDS.filter(c => c.cmd.includes(filter) || c.label.toLowerCase().includes(filter))
        : COMMANDS;
      renderCommandList();
      if (!paletteOpen) {
        paletteOpen = true;
        paletteWrapper.classList.add('open');
        paletteWrapper.setAttribute('aria-hidden', 'false');
        inputEl.classList.add('slash-mode');
      }
      activeIndex = 0;
      updateActive();
    }

    function closePalette() {
      if (!paletteOpen) return;
      paletteOpen = false;
      paletteWrapper.classList.remove('open');
      paletteWrapper.setAttribute('aria-hidden', 'true');
      inputEl.classList.remove('slash-mode');
    }

    function renderCommandList() {
      commandList.innerHTML = '';
      if (!filteredCmds.length) {
        const e = document.createElement('li');
        e.className = 'palette-empty';
        e.textContent = 'No commands match.';
        commandList.appendChild(e);
        return;
      }
      filteredCmds.forEach((cmd, i) => {
        const li  = document.createElement('li');
        li.setAttribute('role', 'option');
        const btn = document.createElement('button');
        btn.className = 'command-item';
        btn.type = 'button';
        btn.dataset.index = i;
        btn.innerHTML = `
          <span class="cmd-icon" aria-hidden="true">${cmd.icon}</span>
          <span class="cmd-body">
            <span class="cmd-name">${cmd.cmd}</span>
            <span class="cmd-desc">${cmd.desc}</span>
          </span>
          ${cmd.type === 'template' ? `<span class="cmd-arg-hint">${cmd.arg}</span>` : ''}
        `;
        btn.addEventListener('click', () => selectCommand(cmd));
        li.appendChild(btn);
        commandList.appendChild(li);
      });
    }

    function updateActive() {
      commandList.querySelectorAll('.command-item').forEach((btn, i) => {
        btn.classList.toggle('active', i === activeIndex);
        if (i === activeIndex) btn.scrollIntoView({ block: 'nearest' });
      });
    }

    function selectCommand(cmd) {
      closePalette();
      if (cmd.type === 'local') {
        inputEl.value = '';
        cmd.fn();
      } else if (cmd.type === 'immediate') {
        inputEl.value = '';
        dispatchCommand(cmd.cmd, cmd.prompt);
      } else {
        inputEl.value = cmd.cmd + ' ';
        inputEl.focus();
      }
    }

    // ── Message helpers ───────────────────────────────────────────────────
    function addMessage(text, role, isCommand = false) {
      const isTyping = role === 'bot typing';
      const baseRole = isTyping ? 'bot' : role;
      const wrapper  = document.createElement('div');
      wrapper.className = `msg-wrapper ${baseRole}`;
      const sender = document.createElement('span');
      sender.className = 'msg-sender';
      sender.textContent = baseRole === 'user' ? 'You' : 'Cheese Master';
      const bubble = document.createElement('div');
      bubble.className = `msg ${baseRole}${isTyping ? ' typing' : ''}${isCommand ? ' is-command' : ''}`;
      if (isTyping) {
        bubble.appendChild(document.createTextNode(text));
        const dots = document.createElement('span');
        dots.className = 'typing-dots';
        dots.innerHTML = '<span></span><span></span><span></span>';
        bubble.appendChild(dots);
      } else {
        bubble.textContent = text;
      }
      wrapper.appendChild(sender);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    async function fetchReply(prompt) {
      sendBtn.disabled = true;
      const typingEl = addMessage('Cheesing', 'bot typing');
      try {
        const res  = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: prompt }) });
        const data = await res.json();
        typingEl.textContent = data.reply || data.detail || 'Something went wrong.';
        typingEl.classList.remove('typing');
      } catch {
        typingEl.className = 'msg error';
        typingEl.textContent = 'Could not reach the backend. Is it running?';
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    async function dispatchCommand(display, prompt) {
      addMessage(display, 'user', true);
      await fetchReply(prompt);
    }

    function resolveSlashCommand(raw) {
      const match = raw.match(/^\/(\w+)(?:\s+(.+))?$/);
      if (!match) return null;
      const [, name, arg] = match;
      const cmd = COMMANDS.find(c => c.cmd === `/${name}`);
      if (!cmd) return null;
      if (cmd.type === 'local')     return { local: true, fn: cmd.fn };
      if (cmd.type === 'immediate') return { display: cmd.cmd, prompt: cmd.prompt };
      if (!arg) return null;
      return { display: raw, prompt: cmd.promptFn(arg.trim()) };
    }

    async function sendMessage() {
      const raw = inputEl.value.trim();
      if (!raw) return;
      closePalette();
      inputEl.value = '';
      if (raw.startsWith('/')) {
        const resolved = resolveSlashCommand(raw);
        if (!resolved) {
          addMessage(raw, 'user', true);
          addMessage("Unknown or incomplete command. Type / to see what's available.", 'bot');
          return;
        }
        if (resolved.local) { resolved.fn(); return; }
        await dispatchCommand(resolved.display, resolved.prompt);
      } else {
        addMessage(raw, 'user');
        await fetchReply(raw);
      }
    }

    inputEl.addEventListener('input', () => {
      const val = inputEl.value;
      if (val.startsWith('/')) openPalette(val.slice(1).toLowerCase());
      else closePalette();
    });

    inputEl.addEventListener('keydown', (e) => {
      if (paletteOpen) {
        if (e.key === 'ArrowDown')  { e.preventDefault(); activeIndex = (activeIndex + 1) % filteredCmds.length; updateActive(); return; }
        if (e.key === 'ArrowUp')    { e.preventDefault(); activeIndex = (activeIndex - 1 + filteredCmds.length) % filteredCmds.length; updateActive(); return; }
        if (e.key === 'Enter')      { e.preventDefault(); if (filteredCmds[activeIndex]) selectCommand(filteredCmds[activeIndex]); return; }
        if (e.key === 'Escape')     { e.preventDefault(); closePalette(); return; }
      }
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    document.addEventListener('click', (e) => {
      if (paletteOpen && !e.target.closest('#palette-wrapper') && !e.target.closest('#chat-input')) closePalette();
    });

    sendBtn.addEventListener('click', sendMessage);

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // ── QUIZ ENGINE ──────────────────────────────────────────────────────
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    const QUIZ_LENGTH  = 5;
    const quizModal    = document.getElementById('quiz-modal');
    const quizBody     = document.getElementById('quiz-body');
    const quizFooter   = document.getElementById('quiz-footer');
    const quizProgress = document.getElementById('quiz-progress-bar');
    const quizCounter  = document.getElementById('quiz-counter');
    const quizQText    = document.getElementById('quiz-question-text');
    const quizOptions  = document.getElementById('quiz-options');
    const quizFeedback = document.getElementById('quiz-feedback');
    const feedVerdict  = document.getElementById('feedback-verdict');
    const feedText     = document.getElementById('feedback-text');
    const quizDots     = document.getElementById('quiz-score-dots');
    const quizNext     = document.getElementById('quiz-next');

    let quizQueue   = [];
    let quizIndex   = 0;
    let quizScore   = 0;
    let quizResults = [];

    function openQuiz() {
      quizQueue   = [...QUIZ_QUESTIONS].sort(() => Math.random() - 0.5).slice(0, QUIZ_LENGTH);
      quizIndex   = 0;
      quizScore   = 0;
      quizResults = [];
      quizModal.hidden = false;
      loadQuizQuestion();
    }

    function closeQuiz() { quizModal.hidden = true; }

    function loadQuizQuestion() {
      const q   = quizQueue[quizIndex];
      const pct = (quizIndex / QUIZ_LENGTH) * 100;
      quizProgress.style.width = `${pct}%`;
      quizCounter.textContent  = `Question ${quizIndex + 1} of ${QUIZ_LENGTH}`;
      quizQText.textContent    = q.q;
      quizFeedback.hidden      = true;
      quizNext.hidden          = true;

      quizDots.innerHTML = '';
      for (let i = 0; i < QUIZ_LENGTH; i++) {
        const dot = document.createElement('div');
        dot.className = 'score-dot';
        if (i < quizResults.length) dot.classList.add(quizResults[i] ? 'hit' : 'miss');
        quizDots.appendChild(dot);
      }

      quizOptions.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'quiz-option';
        btn.type = 'button';
        btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
        btn.addEventListener('click', () => answerQuiz(i));
        quizOptions.appendChild(btn);
      });
    }

    function answerQuiz(chosen) {
      const q       = quizQueue[quizIndex];
      const correct = chosen === q.answer;
      quizScore  += correct ? 1 : 0;
      quizResults.push(correct);

      quizOptions.querySelectorAll('.quiz-option').forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.answer) btn.classList.add('correct');
        else if (i === chosen && !correct) btn.classList.add('wrong');
        else btn.classList.add('dim');
      });

      const dots = quizDots.querySelectorAll('.score-dot');
      if (dots[quizIndex]) dots[quizIndex].classList.add(correct ? 'hit' : 'miss');

      feedVerdict.textContent = correct ? '✓ Correct!' : '✗ Not quite';
      feedVerdict.className   = `feedback-verdict ${correct ? 'correct-v' : 'wrong-v'}`;
      feedText.textContent    = q.fact;
      quizFeedback.hidden     = false;

      quizNext.textContent = (quizIndex === QUIZ_LENGTH - 1) ? 'See results →' : 'Next →';
      quizNext.hidden = false;
    }

    quizNext.addEventListener('click', () => {
      quizIndex++;
      if (quizIndex >= QUIZ_LENGTH) showQuizFinal();
      else loadQuizQuestion();
    });

    function showQuizFinal() {
      quizProgress.style.width = '100%';
      const verdicts = [
        ['An aged master!',       'Your cheese knowledge is truly extraordinary.'],
        ['Impressively gouda!',   'You clearly have exquisite taste in fromage.'],
        ['Well-aged palate!',     "A few more ripening sessions and you'll be perfect."],
        ['Still maturing…',       'Every great cheese takes time. Keep learning!'],
        ['Fresh out of the vat!', 'Even the finest cheeses needed time to develop.'],
      ];
      const v = quizScore === 5 ? 0 : quizScore >= 4 ? 1 : quizScore >= 3 ? 2 : quizScore >= 2 ? 3 : 4;
      quizBody.innerHTML = `
        <div class="quiz-final">
          <div class="final-score-ring">
            <span class="final-score-num">${quizScore}/${QUIZ_LENGTH}</span>
            <span class="final-score-label">correct</span>
          </div>
          <p class="final-verdict">${verdicts[v][0]}</p>
          <p class="final-sub">${verdicts[v][1]}</p>
          <button class="quiz-again-btn" id="quiz-again">Play again</button>
        </div>`;
      quizFooter.innerHTML = '';
      document.getElementById('quiz-again').addEventListener('click', openQuiz);
    }

    document.getElementById('quiz-close').addEventListener('click', closeQuiz);
    document.getElementById('quiz-backdrop').addEventListener('click', closeQuiz);

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // ── SELFIE ENGINE ────────────────────────────────────────────────────
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    const selfieModal     = document.getElementById('selfie-modal');
    const selfieViewport  = document.getElementById('selfie-viewport');
    const selfieVideo     = document.getElementById('selfie-video');
    const selfieCanvas    = document.getElementById('selfie-canvas');
    const selfieCountdown = document.getElementById('selfie-countdown');
    const countdownNum    = document.getElementById('countdown-num');
    const selfieCapture   = document.getElementById('selfie-capture');
    const selfieRetake    = document.getElementById('selfie-retake');
    const selfieDownload  = document.getElementById('selfie-download');
    const selfieEyebrow   = document.getElementById('selfie-eyebrow');
    const selfieCaption   = document.getElementById('selfie-caption');

    let cameraStream = null;

    const SELFIE_CAPTIONS = [
      'Looking absolutely gouda!',
      'Nacho average selfie!',
      "You're looking extra sharp today!",
      'Feta-stic shot!',
      'Say fromage!',
      "You've got great taste — literally.",
    ];

    async function openSelfie() {
      selfieModal.hidden = false;
      selfieEyebrow.textContent = 'Cheese Me';
      selfieCaption.textContent = 'Center your face in the frame';
      selfieVideo.hidden   = false;
      selfieCanvas.hidden  = true;
      selfieCountdown.hidden = true;
      selfieCapture.hidden   = false;
      selfieCapture.disabled = false;
      selfieCapture.textContent = '🧀 Cheese Me!';
      selfieRetake.hidden  = true;
      selfieDownload.hidden = true;

      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
        });
        selfieVideo.srcObject = cameraStream;
        await selfieVideo.play();
      } catch (err) {
        if (err.name === 'AbortError') return;
        selfieViewport.innerHTML = `
          <div class="selfie-camera-error">
            <span class="selfie-camera-error-icon">📵</span>
            <p class="selfie-camera-error-text">Camera access was denied or isn't available.<br>Please allow camera permissions and try again.</p>
          </div>`;
        selfieCapture.disabled = true;
      }
    }

    function closeSelfie() {
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
      selfieModal.hidden = true;
      selfieViewport.innerHTML = '';
      selfieViewport.appendChild(selfieVideo);
      selfieViewport.appendChild(selfieCanvas);
      selfieViewport.appendChild(selfieCountdown);
      selfieVideo.srcObject = null;
    }

    async function startCountdown() {
      selfieCapture.disabled = true;
      selfieCountdown.hidden = false;
      for (let i = 3; i >= 1; i--) {
        countdownNum.textContent = i;
        countdownNum.style.animation = 'none';
        countdownNum.offsetHeight;
        countdownNum.style.animation = 'countdown-pop 0.85s cubic-bezier(0.16,1,0.3,1) both';
        await new Promise(r => setTimeout(r, 900));
      }
      selfieCountdown.hidden = true;
      takeSelfie();
    }

    function takeSelfie() {
      const W = selfieVideo.videoWidth  || 640;
      const H = selfieVideo.videoHeight || 480;
      selfieCanvas.width  = W;
      selfieCanvas.height = H;
      const ctx = selfieCanvas.getContext('2d');
      ctx.translate(W, 0); ctx.scale(-1, 1);
      ctx.drawImage(selfieVideo, 0, 0, W, H);
      ctx.setTransform(1, 0, 0, 1, 0, 0);

      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }

      const pool = (window.CHEESE_PNGS && window.CHEESE_PNGS.length > 0)
        ? window.CHEESE_PNGS
        : ['./src/cheese/cheese_PNG10-3878731391.png'];
      const cheeseSrc = pool[Math.floor(Math.random() * pool.length)];
      const cheeseImg = new Image();
      cheeseImg.onload = () => {
        const cheeseW = W * 0.55;
        const cheeseH = (cheeseImg.naturalHeight / cheeseImg.naturalWidth) * cheeseW;
        const cx = (W - cheeseW) / 2;
        const cy = -cheeseH * 0.28;
        const angle = (Math.random() - 0.5) * 0.22;
        ctx.save();
        ctx.translate(cx + cheeseW / 2, cy + cheeseH / 2);
        ctx.rotate(angle);
        ctx.drawImage(cheeseImg, -cheeseW / 2, -cheeseH / 2, cheeseW, cheeseH);
        ctx.restore();
        showSelfieResult();
      };
      cheeseImg.onerror = () => showSelfieResult();
      cheeseImg.src = cheeseSrc;
    }

    function showSelfieResult() {
      selfieVideo.hidden  = true;
      selfieCanvas.hidden = false;
      selfieEyebrow.textContent = 'Looking gouda!';
      selfieCaption.textContent = SELFIE_CAPTIONS[Math.floor(Math.random() * SELFIE_CAPTIONS.length)];
      selfieCapture.hidden  = true;
      selfieRetake.hidden   = false;
      selfieDownload.hidden = false;
    }

    selfieCapture.addEventListener('click', startCountdown);

    selfieRetake.addEventListener('click', () => {
      selfieVideo.hidden  = false;
      selfieCanvas.hidden = true;
      selfieEyebrow.textContent = 'Cheese Me';
      selfieCaption.textContent = 'Center your face in the frame';
      selfieCapture.hidden   = false;
      selfieCapture.disabled = false;
      selfieRetake.hidden    = true;
      selfieDownload.hidden  = true;
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } }).then(stream => {
        cameraStream = stream;
        selfieVideo.srcObject = stream;
        selfieVideo.play().catch(() => {});
      });
    });

    selfieDownload.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'cheese-selfie.png';
      link.href = selfieCanvas.toDataURL('image/png');
      link.click();
    });

    document.getElementById('selfie-close').addEventListener('click', closeSelfie);
    document.getElementById('selfie-backdrop').addEventListener('click', closeSelfie);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (!quizModal.hidden)   closeQuiz();
        if (!selfieModal.hidden) closeSelfie();
        const co = document.getElementById('cheddar-overlay');
        if (co) co._dismiss();
      }
    });

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // ── CHEDDAR DRIP ENGINE ──────────────────────────────────────────────
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    const CHEDDAR_PALETTE = ['#f4921e','#e8800e','#ffaa32','#d97010','#f5a030','#de7808','#fbb040','#c86808'];

    function cheddarShade(hex, amt) {
      const n = parseInt(hex.slice(1), 16);
      const r = Math.min(255, Math.max(0, (n >> 16)        + amt));
      const g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + amt));
      const b = Math.min(255, Math.max(0,  (n & 0xff)       + amt));
      return `rgb(${r},${g},${b})`;
    }

    function buildCheddarDrips(W) {
      const drips = [];
      let x = 0;
      while (x < W + 30) {
        const w = 50 + Math.random() * 80;
        const col = CHEDDAR_PALETTE[Math.floor(Math.random() * CHEDDAR_PALETTE.length)];
        drips.push({
          x: x - 10, w: w + 20, y: 0,
          speed: 2.2 + Math.random() * 3.4,
          delay: Math.random() * 1400,
          color: col, r: (w + 20) * 0.62, done: false,
        });
        x += w;
      }
      return drips;
    }

    function drawCheddarDrip(ctx, { x, w, y, color, r }, H) {
      if (y <= 0) return;
      const tip = Math.min(y, H + r);
      const g = ctx.createLinearGradient(x, 0, x + w, 0);
      g.addColorStop(0,    cheddarShade(color, -30));
      g.addColorStop(0.25, cheddarShade(color, +18));
      g.addColorStop(0.55, cheddarShade(color, +32));
      g.addColorStop(0.8,  cheddarShade(color, +10));
      g.addColorStop(1,    cheddarShade(color, -30));
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + w, 0);
      ctx.lineTo(x + w, Math.max(0, tip - r * 0.45));
      ctx.bezierCurveTo(x + w + r * 0.55, tip + r * 0.05, x + w + r * 0.45, tip + r * 0.65, x + w / 2, tip + r * 0.58);
      ctx.bezierCurveTo(x - r * 0.45, tip + r * 0.65, x - r * 0.55, tip + r * 0.05, x, Math.max(0, tip - r * 0.45));
      ctx.closePath();
      ctx.fillStyle = g;
      ctx.fill();
      if (y < H + r * 0.5) {
        const hx = x + w * 0.33, hy = tip + r * 0.05;
        const hg = ctx.createRadialGradient(hx, hy, 0, hx, hy, r * 0.48);
        hg.addColorStop(0, 'rgba(255,255,255,0.42)');
        hg.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.beginPath();
        ctx.ellipse(hx, hy, r * 0.42, r * 0.28, -0.3, 0, Math.PI * 2);
        ctx.fillStyle = hg;
        ctx.fill();
      }
    }

    function openCheddar() {
      if (document.getElementById('cheddar-overlay')) return;
      const W = window.innerWidth, H = window.innerHeight;
      const overlay = document.createElement('div');
      overlay.id = 'cheddar-overlay';
      Object.assign(overlay.style, { position: 'fixed', inset: '0', zIndex: '9999', pointerEvents: 'all' });
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      Object.assign(canvas.style, { position: 'absolute', inset: '0', display: 'block' });
      overlay.appendChild(canvas);
      document.body.appendChild(overlay);

      const ctx   = canvas.getContext('2d');
      const drips = buildCheddarDrips(W);
      let startTime = null, rafId;

      function animate(ts) {
        if (!startTime) startTime = ts;
        const elapsed = ts - startTime;
        ctx.clearRect(0, 0, W, H);
        let allDone = true;
        drips.forEach(drip => {
          if (elapsed < drip.delay) { allDone = false; return; }
          if (!drip.done) {
            drip.y += drip.speed;
            if (drip.y >= H + drip.r) { drip.y = H + drip.r; drip.done = true; }
            else { allDone = false; }
          }
          drawCheddarDrip(ctx, drip, H);
        });
        if (allDone) showCheddarVictory(overlay);
        else rafId = requestAnimationFrame(animate);
      }

      rafId = requestAnimationFrame(animate);
      overlay._dismiss = () => {
        cancelAnimationFrame(rafId);
        overlay.style.transition = 'opacity 0.55s ease';
        overlay.style.opacity    = '0';
        overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
      };
    }

    function showCheddarVictory(overlay) {
      const msg = document.createElement('div');
      Object.assign(msg.style, {
        position: 'absolute', inset: '0',
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        textAlign: 'center', padding: '24px',
        animation: 'msg-rise 0.55s cubic-bezier(0.16,1,0.3,1) both',
      });
      msg.innerHTML = `
        <p style="font-family:'Outfit',sans-serif;font-size:0.65rem;font-weight:500;
                  letter-spacing:0.26em;text-transform:uppercase;
                  color:rgba(255,255,255,0.65);margin-bottom:16px;">The Cheese Has Won</p>
        <h2 style="font-family:'Cormorant Garamond',Georgia,serif;
                   font-size:clamp(2.4rem,7vw,4.2rem);font-weight:300;
                   color:white;line-height:1.15;margin-bottom:36px;
                   text-shadow:0 4px 24px rgba(120,50,0,0.55);">
          Everything is<br><em style="font-style:italic;font-weight:400;">Cheddar</em> now.
        </h2>
        <button id="cheddar-dismiss"
          style="padding:13px 32px;border-radius:14px;
                 background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);
                 color:white;font-family:'Outfit',sans-serif;font-size:0.92rem;font-weight:500;
                 cursor:pointer;letter-spacing:0.02em;transition:background 0.15s ease,transform 0.1s ease;">
          Melt away
        </button>`;
      overlay.appendChild(msg);
      const btn = overlay.querySelector('#cheddar-dismiss');
      btn.addEventListener('mouseenter', () => { btn.style.background = 'rgba(255,255,255,0.26)'; });
      btn.addEventListener('mouseleave', () => { btn.style.background = 'rgba(255,255,255,0.15)'; });
      btn.addEventListener('mousedown',  () => { btn.style.transform  = 'scale(0.96)'; });
      btn.addEventListener('mouseup',    () => { btn.style.transform  = 'scale(1)'; });
      btn.addEventListener('click',      () => overlay._dismiss());
    }
  </script>
